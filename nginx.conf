server {
    listen 80;
    
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Si tienes un backend PHP en el mismo servidor, añade esto:
    location /api {
        proxy_pass http://php-service:9000; # Nombre del servicio PHP en Easypanel
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}